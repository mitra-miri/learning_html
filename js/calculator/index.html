<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css" >
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <h1>Online Calculator</h1>
        <input type="number" id="number1" placeholder="first number">
        <select id="operator">
            <option value="+">+</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="-">-</option>
        </select>
        <input type="number" id="number2" placeholder="first number">
        <button id="Calculate">Calculate</button>
        <p id="result">Result will be displayed here</p>
    </div>
    <script src="javaScript.js"></script>
    
</body>
</html>
